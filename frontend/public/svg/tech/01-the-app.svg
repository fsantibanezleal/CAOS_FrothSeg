<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" class="arch-svg" role="img" aria-label="What FrothSeg is: a froth frame in, live SAM-class segmentation, bubble-size distribution and froth state out">
  <!-- Hand-authored. Every colour is a shell CSS variable, so the diagram repaints with the active theme. -->
  <style>
    .arch-svg text { font-family: var(--font-sans, Inter, "Segoe UI", system-ui, sans-serif); }
    .arch-svg .mono { font-family: var(--font-mono, ui-monospace, Consolas, monospace); }
    .arch-svg .bx { fill: var(--color-surface-2); stroke: var(--color-border); stroke-width: 1.2; }
    .arch-svg .bx-hi { stroke: var(--color-accent); }
    .arch-svg .bx-good { stroke: var(--color-good); }
    .arch-svg .ttl { fill: var(--color-fg); font-size: 13px; font-weight: 700; }
    .arch-svg .it { fill: var(--color-fg); font-size: 11px; font-weight: 600; }
    .arch-svg .mu { fill: var(--color-fg-subtle); font-size: 10px; }
    .arch-svg .cd { fill: var(--color-accent); font-size: 9.5px; }
    .arch-svg .flow { fill: none; stroke: var(--color-fg-faint); stroke-width: 1.6; }
  </style>
  <defs>
    <marker id="ap-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--color-fg-faint)"/>
    </marker>
  </defs>

  <text class="ttl" x="22" y="30">FrothSeg: bubble segmentation + size distribution, live in the browser</text>
  <text class="mu" x="22" y="48">A flotation-froth frame in; the instance masks, the bubble-size distribution and the froth state out, with no backend.</text>

  <rect class="bx bx-hi" x="20" y="74" width="180" height="150" rx="10"/>
  <text class="it" x="34" y="98">Froth frame</text>
  <text class="mu" x="34" y="118">Upload a REAL froth photo</text>
  <text class="mu" x="34" y="134">(bring your own), or pick a</text>
  <text class="mu" x="34" y="150">synthetic sample with exact</text>
  <text class="mu" x="34" y="166">ground-truth masks.</text>
  <text class="cd mono" x="34" y="196">Contract 1: the froth gate</text>
  <text class="mu" x="34" y="212">size/contrast/glare checks</text>

  <rect class="bx" x="232" y="74" width="170" height="150" rx="10"/>
  <text class="it" x="246" y="98">Front-end (optional)</text>
  <text class="mu" x="246" y="118">Illumination flatten +</text>
  <text class="mu" x="246" y="134">specular deglare, so real</text>
  <text class="mu" x="246" y="150">glare does not wash out</text>
  <text class="mu" x="246" y="166">the bubble borders.</text>
  <text class="cd mono" x="246" y="196">src/preprocess/deglare.ts</text>
  <text class="mu" x="246" y="212">reacts to the Contract-1 flags</text>

  <rect class="bx bx-good" x="434" y="74" width="184" height="150" rx="10"/>
  <text class="it" x="448" y="98">Live SAM-class core</text>
  <text class="mu" x="448" y="118">A SAM-family foundation</text>
  <text class="mu" x="448" y="134">model (SlimSAM/MobileSAM),</text>
  <text class="mu" x="448" y="150">zero-shot, run as an auto-</text>
  <text class="mu" x="448" y="166">mask generator on WebGPU.</text>
  <text class="cd mono" x="448" y="196">onnxruntime-web + WebGPU</text>
  <text class="mu" x="448" y="212">WASM-SIMD fallback</text>

  <rect class="bx bx-good" x="650" y="74" width="186" height="150" rx="10"/>
  <text class="it" x="664" y="98">What you get</text>
  <text class="mu" x="664" y="118">Per-bubble instance masks,</text>
  <text class="mu" x="664" y="134">the size distribution (D10/</text>
  <text class="mu" x="664" y="150">D50/D90, Sauter d32), the</text>
  <text class="mu" x="664" y="166">froth state + descriptors.</text>
  <text class="cd mono" x="664" y="196">src/sam/ + src/viz/</text>
  <text class="mu" x="664" y="212">everything client-side</text>

  <path class="flow" d="M200,149 H230" marker-end="url(#ap-arrow)"/>
  <path class="flow" d="M402,149 H432" marker-end="url(#ap-arrow)"/>
  <path class="flow" d="M618,149 H648" marker-end="url(#ap-arrow)"/>

  <rect class="bx" x="20" y="248" width="816" height="88" rx="10"/>
  <text class="it" x="36" y="272">It is a real workbench, not a demo</text>
  <text class="mu" x="36" y="292">The segmenter genuinely runs in your browser on the frame you provide; nothing is pre-baked for the live path.</text>
  <text class="mu" x="36" y="310">Synthetic samples carry EXACT masks so the method is scored with real mask metrics (AP, BSD-Wasserstein) against</text>
  <text class="mu" x="36" y="328">ground truth; that synthetic AP is a controlled benchmark, never reported as real-plant accuracy.</text>

  <rect class="bx" x="20" y="352" width="404" height="92" rx="10"/>
  <text class="it" x="36" y="376">Classical floor, alongside</text>
  <text class="mu" x="36" y="396">A cited watershed / SLIC baseline runs too,</text>
  <text class="mu" x="36" y="414">so you compare the foundation model against</text>
  <text class="mu" x="36" y="432">the transparent classical method on the frame.</text>

  <rect class="bx bx-good" x="444" y="352" width="392" height="92" rx="10"/>
  <text class="it" x="460" y="376">Live controls</text>
  <text class="mu" x="460" y="396">Prompt-grid density, predicted-IoU + stability</text>
  <text class="mu" x="460" y="414">thresholds and the deglare front-end are all</text>
  <text class="mu" x="460" y="432">adjustable, and the segmentation re-runs live.</text>
</svg>
